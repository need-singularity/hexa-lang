# hexa.toml — HEXA-LANG package manifest (self-host, cargo-free)
#
# Spec: shared/hexa-lang/hexa-toml-spec.json (version 1.0.0)
# Replaces the deleted Cargo.toml after full src/ → self/ absorption.
# HEXA-LANG is now 100% Rust-free; this manifest describes the self-host
# project in its own native format.

[package]
name = "hexa-lang"
version = "1.0.0"
entry = "self/main.hexa"
description = "The Perfect Number Programming Language — every constant from n=6"
license = "MIT"
authors = ["박민우 <nerve011235@gmail.com>"]
repository = "https://github.com/need-singularity/hexa-lang"
homepage = "https://github.com/need-singularity/hexa-lang"
readme = "README.md"
keywords = ["programming-language", "compiler", "interpreter", "consciousness", "n6", "self-host"]
categories = ["language", "compiler", "perfect-number"]

[build]
# hexa_v2 → C → clang → hexa_v3 self-host pipeline.
# Only external dependency: clang (for the C → native stage).
script = "build_hexa.hexa"
stages = ["stage1", "stage2", "stage3"]
artifacts = ["./hexa"]

[lib]
# Library entry — importable by other hexa packages.
entry = "self/lib.hexa"

[[bin]]
name = "hexa"
path = "self/main.hexa"

[test]
runner = "./hexa"
files = [
    "self/test_interp.hexa",
    "self/test_interp_e2e.hexa",
    "self/test_interp_match.hexa",
    "self/test_interp_valuesystem.hexa",
]
baseline = 205

[workspace]
members = [
    "pkg/hx",
    "playground",
    "editors/jetbrains",
    "stdlib",
]

# ── Dependencies ───────────────────────────────────────────
# HEXA-LANG itself has ZERO runtime dependencies beyond the precompiled
# hexa binary. External tools needed only for rebuild/distribution:
#
#   clang       — C → native (build_hexa.hexa stage2)
#   git         — version control
#   bash        — pkg/hx scripts + build.sh wrappers
#
# No cargo. No rustc. No wasm-pack. No python. No brew.

[dependencies]
# (none)

# ── n=6 alignment ──────────────────────────────────────────
# keywords count = 6 = σ(6)/2
# categories count = 3 < τ(6)=4
# build stages = 3 (matches σ-τ primitive count 8 / τ=4)
# sections used = 7 (σ+φ-τ-sopfr+1 = 12+2-4-5+1 = 6; this file has 7)
#
# The project manifest itself conforms to the n=6 aesthetic that the
# language was built from: every constant comes from perfect-number
# arithmetic, zero arbitrary choices.
