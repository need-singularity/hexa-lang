[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-framework", "-C", "link-arg=Accelerate"]

[target.x86_64-unknown-linux-gnu]
# OpenBLAS (was BLIS). 2026-04-11 htz benchmark on AMD Ryzen 9 7950X3D:
#   BLIS dgemm N=1024:    51.10 GFLOPS
#   OpenBLAS dgemm N=1024: 446.57 GFLOPS  ← 8.7× faster
#   OpenBLAS dgemm N=2048: 368.74 GFLOPS
#
# OpenBLAS smashes the roadmap #2 target (100 GFLOPS sustained, 4x gap)
# by 4.5× with no other changes. Switching backends is one line.
# Closes shared/config/roadmaps/anima_hexa_common.json next_action #2.
rustflags = ["-C", "link-arg=-lopenblas", "-C", "link-arg=-lm"]

[target.x86_64-unknown-linux-musl]
linker = "x86_64-linux-musl-gcc"
rustflags = ["-C", "target-feature=+crt-static"]
