[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-framework", "-C", "link-arg=Accelerate"]

[target.x86_64-unknown-linux-gnu]
# Intel MKL — 명시적 threaded layer link (PyTorch와 동일 전략).
# -lmkl_intel_lp64: interface layer
# -lmkl_gnu_thread: GNU OpenMP threading
# -lmkl_core: core
# -lgomp: GNU OpenMP runtime
rustflags = [
    "-C", "link-arg=-Wl,--start-group",
    "-C", "link-arg=-lmkl_intel_lp64",
    "-C", "link-arg=-lmkl_gnu_thread",
    "-C", "link-arg=-lmkl_core",
    "-C", "link-arg=-Wl,--end-group",
    "-C", "link-arg=-lgomp",
    "-C", "link-arg=-lpthread",
    "-C", "link-arg=-lm",
    "-C", "link-arg=-ldl",
]
