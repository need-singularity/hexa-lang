<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEXA Playground</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="logo">HEXA Playground <span class="n6">n=6</span></div>
            <div class="subtitle">The Perfect Number Language</div>
        </div>
        <div class="header-right">
            <span id="status" class="status"></span>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <button id="btn-run" class="btn btn-primary">
            Run <kbd>Ctrl+Enter</kbd>
        </button>
        <button id="btn-format" class="btn">Format</button>
        <button id="btn-share" class="btn">Share</button>

        <div class="toolbar-spacer"></div>

        <select id="example-select" class="example-select">
            <option value="">Load example...</option>
        </select>
    </div>

    <!-- Main split pane -->
    <div class="main">
        <!-- Editor pane -->
        <div id="editor-pane" class="pane" style="flex: 0 0 50%">
            <div class="pane-header">
                <span>editor</span>
                <span id="lint-count" class="lint-count"></span>
            </div>
            <div class="editor-container">
                <div id="line-numbers" class="line-numbers"></div>
                <div id="highlight" class="editor-highlight"></div>
                <textarea
                    id="editor"
                    class="editor"
                    spellcheck="false"
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="off"
                    placeholder="// Write HEXA code here..."
                ></textarea>
            </div>
        </div>

        <!-- Divider -->
        <div id="divider" class="divider"></div>

        <!-- Output pane -->
        <div id="output-pane" class="pane" style="flex: 0 0 50%">
            <div class="pane-header">
                <span>output</span>
            </div>
            <div id="output" class="output">
                <span class="info-line">Click Run or press Ctrl+Enter to execute.</span>
            </div>
            <div id="lint-panel" class="lint-panel"></div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <span>sigma(n)*phi(n) = n*tau(n) iff n = 6</span>
        <span>
            <a href="https://github.com/need-singularity/hexa-lang" target="_blank" rel="noopener">
                GitHub
            </a>
        </span>
    </div>

    <script type="module" src="playground.js"></script>
</body>
</html>
